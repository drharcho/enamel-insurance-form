name: PHP Lint

on:
  push:
    paths:
      - '**/*.php'
  pull_request:
    paths:
      - '**/*.php'

jobs:
  lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Check PHP syntax
        run: |
          echo "Scanning for PHP syntax errors..."
          find . -name "*.php" -not -path "./.git/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "✅ All PHP files passed syntax check."
